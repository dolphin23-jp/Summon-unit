name: T048 support patch runner

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'agent/t048-support-release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/t048-support-release
          fetch-depth: 0
      - name: Apply scoped support model patch
        run: |
          if [ ! -f .github/t048-support-model.py ]; then
            echo 'Patch already applied.'
            exit 0
          fi
          python .github/t048-support-model.py
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "T048 add data-driven healing model"
          git push origin HEAD:agent/t048-support-release
