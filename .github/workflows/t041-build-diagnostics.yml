name: T041 Build Diagnostics

on:
  pull_request:
    branches: [main]
    paths-ignore: [t041-build-error.txt]

permissions:
  contents: write

jobs:
  build-diagnostics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/t041-save-migration-framework
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: |
          corepack enable
          corepack prepare pnpm@10.13.1 --activate
      - run: pnpm install --no-frozen-lockfile
      - name: Capture build failure
        run: |
          set +e
          pnpm build > /tmp/t041-build.log 2>&1
          status=$?
          tail -120 /tmp/t041-build.log > t041-build-error.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add t041-build-error.txt
          git commit -m "Capture T041 build diagnostics" || true
          git push
          exit $status
