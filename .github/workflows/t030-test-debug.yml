name: T030 Test Debug

on:
  pull_request:

permissions:
  contents: read

jobs:
  test-debug:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Run concise tests
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git clone --quiet --depth 1 --branch agent/t030-manual-preview "https://x-access-token:${GH_TOKEN}@github.com/dolphin23-jp/Summon-unit.git" repo
          cd repo
          corepack enable >/dev/null 2>&1
          corepack prepare pnpm@10.13.1 --activate >/dev/null 2>&1
          pnpm install --no-frozen-lockfile --reporter=silent >/dev/null 2>&1
          set +e
          pnpm test > /tmp/t030-test.log 2>&1
          status=$?
          set -e
          tail -n 35 /tmp/t030-test.log
          exit "$status"
