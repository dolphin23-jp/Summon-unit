name: T037 Debug Build

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@10.13.1 --activate
      - name: Install quietly
        run: pnpm install --no-frozen-lockfile >/dev/null
      - name: Concise build diagnostics
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          pnpm build > build.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            {
              echo '### T037 concise build diagnostics'
              echo '```text'
              tail -n 100 build.log
              echo '```'
            } > build-comment.md
            gh pr comment "${{ github.event.pull_request.number }}" --body-file build-comment.md
          fi
          exit $status
