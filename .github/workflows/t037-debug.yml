name: T037 Debug Build

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply T037 type-boundary fix
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          screen = Path('src/ui/ResearchScreen.tsx')
          text = screen.read_text()
          text = text.replace(
              "import type { PlayerData, PlayerResearchNodeState } from '../progression/player-data'",
              "import type { PlayerData } from '../progression/player-data'",
          )
          text = text.replace(
              "  RESEARCH_METHODS,\n  type ResearchMethod,",
              "  RESEARCH_METHODS,\n  type PlayerResearchNodeState,\n  type ResearchMethod,",
          )
          screen.write_text(text)

          facility = Path('src/progression/research-facility.ts')
          text = facility.read_text()
          text = text.replace(
              "import type { T036ProgressionCatalog } from './t036-progression-model'",
              "import type { ResearchNodeDefinition } from './research-model'\nimport type { T036ProgressionCatalog } from './t036-progression-model'",
          )
          text = text.replace(
              "export interface T037ProgressionCatalog extends T036ProgressionCatalog {\n  readonly researchFacilityStages:",
              "export interface T037ProgressionCatalog extends T036ProgressionCatalog {\n  readonly researchNodes: readonly ResearchNodeDefinition[]\n  readonly researchFacilityStages:",
          )
          facility.write_text(text)
          PY
          if ! git diff --quiet; then
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add src/ui/ResearchScreen.tsx src/progression/research-facility.ts
            git commit -m "T037 fix research UI type boundaries"
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
          fi
      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@10.13.1 --activate
      - name: Install quietly
        run: pnpm install --no-frozen-lockfile >/dev/null
      - name: Concise build diagnostics
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          pnpm build > build.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            {
              echo '### T037 concise build diagnostics'
              echo '```text'
              tail -n 100 build.log
              echo '```'
            } > build-comment.md
            gh pr comment "${{ github.event.pull_request.number }}" --body-file build-comment.md
          fi
          exit $status
