name: Apply T040 documentation patch

on:
  push:
    branches: [agent/t040-indexeddb-save-slots]
    paths: [.github/workflows/t040-docs-patch.yml]

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/t040-indexeddb-save-slots
      - name: Patch schema and UI documents
        run: |
          python - <<'PY'
          from pathlib import Path

          schema = Path('docs/16_DATA_SCHEMAS.md')
          text = schema.read_text()
          text = text.replace('## プレイヤー状態（T036時点）', '## プレイヤー状態（T040時点）', 1)
          text = text.replace(
              'T036ではコレクション、編成、経済、研究進行を同じPlayerDataへ統合したまま、既存フィールドを使って確定研究、召喚、還元、修復、開花を処理します。地域進行と戦闘中断状態は後続タスクで同じトップレベルへ合成します。',
              'T040ではコレクション、編成、経済、研究進行、研究施設、地域進行を同じPlayerDataへ統合します。セーブ世代とスロットポインタはPlayerDataの外側で管理し、戦闘中断状態はT042で追加します。',
              1,
          )
          text = text.replace(
              'T035のデモPlayerDataは研究状態追加に伴いschemaVersion 3です。T036は保存フィールドを追加しないためschemaVersion 3を維持します。IndexedDB永続化とmigrationは未実装です。',
              'T039デモPlayerDataは地域進行までを含むschemaVersion 6です。T040はPlayerData外側へ保存世代を追加するためschemaVersion 6を維持します。IndexedDB永続化は実装済みで、migrationはT041です。',
              1,
          )
          old_repository = '''## Repository境界

```ts
type PlayerSaveSlotId = 'slot-1' | 'slot-2' | 'slot-3';

interface PlayerDataRepository {
  listSlots(): Promise<readonly PlayerSaveSlotId[]>;
  load(slotId: PlayerSaveSlotId): Promise<PlayerData | null>;
  save(slotId: PlayerSaveSlotId, playerData: PlayerData): Promise<void>;
  delete(slotId: PlayerSaveSlotId): Promise<void>;
}
```

メモリアダプタは研究と経済を含むPlayerData全体を再検証して保存します。IndexedDB、JSON export/import、クラウド同期は同じRepositoryインターフェースの別アダプタとします。
'''
          new_repository = '''## Repository境界

```ts
type SaveSlotId = 'slot-1' | 'slot-2' | 'slot-3';
type SaveGenerationState = 'TEMPORARY' | 'COMMITTED';

interface SaveGenerationRecord {
  generationId: string;
  slotId: SaveSlotId;
  savedAtEpochMs: number;
  state: SaveGenerationState;
  checksum: string;
  playerData: PlayerData;
}

interface SaveSlotPointer {
  slotId: SaveSlotId;
  currentGenerationId: string;
  backupGenerationIds: string[];
  updatedAtEpochMs: number;
}

interface SaveRepository {
  putTemporaryGeneration(record: SaveGenerationRecord): Promise<void>;
  readGeneration(generationId: string): Promise<SaveGenerationRecord | null>;
  readSlotPointer(slotId: SaveSlotId): Promise<SaveSlotPointer | null>;
  commitTemporaryGeneration(input: {
    slotId: SaveSlotId;
    generationId: string;
    maximumBackupGenerations: number;
  }): Promise<SaveSlotPointer>;
  deleteGeneration(generationId: string): Promise<void>;
  deleteSlot(slotId: SaveSlotId): Promise<void>;
}
```

T040のIndexedDBアダプタはgeneration storeとslot pointer storeを分離します。仮世代の再読込検証後、単一transactionでCOMMITTED化、current切替、旧currentのバックアップ化、世代上限超過分の削除を行います。JSON export/importはT042、クラウド同期は将来同じRepository境界の別アダプタとして追加します。
'''
          if old_repository not in text:
              raise SystemExit('expected repository section not found')
          schema.write_text(text.replace(old_repository, new_repository, 1))

          ui = Path('docs/12_UI_UX.md')
          ui_text = ui.read_text()
          marker = '## アクセシビリティ\n'
          save_section = '''## セーブスロット画面

- 固定3スロットを常時表示
- 保存日時、基本通貨、研究データ、所持個体数、クリア数、schema/content version、バックアップ数を表示
- 空きスロットへの保存、既存スロットの上書き、非使用中スロットのロード・削除
- 使用中スロットは削除不可
- 自動保存ON/OFFと使用中スロットだけをlocalStorageへ保存
- 保存・ロード中は操作ボタンを無効化
- current破損時にバックアップを使用した場合はテキストで通知
- IndexedDB未対応時は永続化不可を`role="status"`相当で通知し、ゲーム自体は継続可能

PCでは3カラム、狭い画面では1カラムへ変形します。保存操作はドラッグを要求せず、タッチ・クリックだけで完結します。

'''
          if marker not in ui_text:
              raise SystemExit('accessibility marker not found')
          ui.write_text(ui_text.replace(marker, save_section + marker, 1))
          PY
      - name: Commit documentation patch
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add docs/12_UI_UX.md docs/16_DATA_SCHEMAS.md
          git commit -m "Document T040 save schemas and UI"
          git push
