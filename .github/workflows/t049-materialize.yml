name: T049 Build Diagnostic

on:
  push:
    branches:
      - agent/t049-display-name-masters

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/t049-display-name-masters
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.13.1 --activate
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Capture build result
        id: build
        shell: bash
        run: |
          set +e
          set -o pipefail
          pnpm build 2>&1 | tee t049-build.log
          code=${PIPESTATUS[0]}
          echo "code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Commit diagnostic
        if: steps.build.outputs.code != '0'
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add t049-build.log
          git commit -m "chore: capture T049 build diagnostic"
          git push origin HEAD:agent/t049-display-name-masters
      - name: Fail when build fails
        if: steps.build.outputs.code != '0'
        run: exit 1
