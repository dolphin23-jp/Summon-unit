name: Apply temporary monster images

on:
  push:
    branches:
      - agent/temporary-monster-images

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/temporary-monster-images
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Generate assets and patch UI
        run: python scripts/apply-temporary-monster-images.py
      - name: Commit generated implementation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/monsters src/ui/CollectionScreen.tsx src/ui/MonsterIcon.tsx src/ui/MonsterIcon.test.ts src/ui/monster-image-presentation.ts src/t033.css
          git diff --cached --quiet && exit 0
          git commit -m "add monster images with fallback"
          git push
