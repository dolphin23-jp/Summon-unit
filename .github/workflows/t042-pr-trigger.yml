name: Normalize T042 stable snapshots

on:
  pull_request:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/t042-export-import-battle-resume
      - name: Normalize stable snapshot JSON
        run: |
          if grep -q "const serializable" src/battle/interactive-battle-runner.ts; then
            exit 0
          fi
          python tools/t042_fix_snapshot_json.py
      - name: Commit stable snapshot normalization
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/battle/interactive-battle-runner.ts
          git commit -m "Normalize stable battle snapshots for JSON" || true
          git push
