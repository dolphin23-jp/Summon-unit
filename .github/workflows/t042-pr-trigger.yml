name: Apply T042 battle and save UI

on:
  pull_request:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/t042-export-import-battle-resume
      - name: Patch battle and save UI
        run: |
          if grep -q "onExportJson" src/ui/SaveSlotScreen.tsx; then
            exit 0
          fi
          python tools/t042_patch_battle_ui.py
      - name: Commit battle and save UI
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/ui/MinimalBattleScreen.tsx src/ui/SaveSlotScreen.tsx src/t040.css
          git commit -m "Add save transfer and battle snapshot UI" || true
          git push
