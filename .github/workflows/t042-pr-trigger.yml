name: Apply T042 save generation

on:
  pull_request:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/t042-export-import-battle-resume
      - name: Patch save generation
        run: |
          if grep -q "calculateCanonicalJsonChecksum" src/save/save-model.ts; then
            exit 0
          fi
          python tools/t042_patch_save.py
      - name: Commit save generation
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/save/save-model.ts src/save/save-repository.ts src/save/browser-save-runtime.ts
          git commit -m "Persist resumable battle sessions" || true
          git push
