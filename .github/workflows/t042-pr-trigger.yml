name: Apply T042 battle snapshot

on:
  pull_request:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/t042-export-import-battle-resume
      - name: Patch battle runner
        run: |
          if grep -q "INTERACTIVE_BATTLE_STABLE_SNAPSHOT_VERSION" src/battle/interactive-battle-runner.ts; then
            exit 0
          fi
          python tools/t042_patch_runner.py
      - name: Commit battle runner
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/battle/interactive-battle-runner.ts
          git commit -m "Add stable battle snapshot restoration" || true
          git push
