name: Apply T042 application integration

on:
  pull_request:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/t042-export-import-battle-resume
      - name: Patch application integration
        run: |
          if grep -q "exportCurrentSave" src/App.tsx; then
            exit 0
          fi
          python tools/t042_patch_app.py
      - name: Commit application integration
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/App.tsx
          git commit -m "Integrate save transfer and battle resume" || true
          git push
