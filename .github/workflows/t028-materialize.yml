name: Materialize T028 patch

on:
  push:
    branches:
      - agent/t028-interactive-battle-runner

permissions:
  contents: write

jobs:
  materialize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply staged implementation
        run: |
          base64 --decode .agent/t028-patch.tar.gz.b64 > /tmp/t028-patch.tar.gz
          tar -xzf /tmp/t028-patch.tar.gz -C .
          rm -rf .agent
          rm .github/workflows/t028-materialize.yml
      - name: Commit implementation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "T028 add interactive battle runner"
          git push
