            if (record.checksum !== checksum) {
              throw new Error(`save generation checksum mismatch: ${record.generationId}`)
            }
            return record""",
          """  const checksum = calculateStoredPlayerDataChecksum(record.playerData)
            if (record.checksum !== checksum) {
