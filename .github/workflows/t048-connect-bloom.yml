name: T048 connect bloom research UI

on:
  push:
    branches: [agent/t048-v0-1-release]
    paths:
      - .github/workflows/t048-connect-bloom.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/t048-v0-1-release
          fetch-depth: 0
      - name: Connect release research screen
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/App.tsx')
          content = path.read_text()
          old_import = "import { ResearchScreen } from './ui/ResearchScreen'"
          new_import = "import { T048ResearchScreen } from './ui/T048ResearchScreen'"
          if old_import not in content:
              raise SystemExit('ResearchScreen import was not found')
          content = content.replace(old_import, new_import, 1)
          if '<ResearchScreen' not in content:
              raise SystemExit('ResearchScreen usage was not found')
          content = content.replace('<ResearchScreen', '<T048ResearchScreen', 1)
          content = content.replace(
              "setSaveNotice('T047垂直スライスの初期進行を保存しました。')",
              "setSaveNotice('v0.1垂直スライスの初期進行を保存しました。')",
              1,
          )
          path.write_text(content)
          PY
          rm .github/workflows/t048-connect-bloom.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/App.tsx .github/workflows/t048-connect-bloom.yml
          git commit -m "T048 connect bloom research UI"
          git push origin HEAD:agent/t048-v0-1-release
