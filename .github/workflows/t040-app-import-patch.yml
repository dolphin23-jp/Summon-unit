name: Apply T040 region wrapper import

on:
  push:
    branches: [agent/t040-indexeddb-save-slots]
    paths: [.github/workflows/t040-app-import-patch.yml]

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/t040-indexeddb-save-slots
      - name: Patch App import
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/App.tsx')
          text = path.read_text()
          old = "import { RegionScreen } from './ui/RegionScreen'"
          new = "import { T040RegionScreen as RegionScreen } from './ui/T040RegionScreen'"
          if old not in text:
              raise SystemExit('expected RegionScreen import not found')
          path.write_text(text.replace(old, new, 1))
          PY
      - name: Commit patch
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/App.tsx
          git commit -m "Connect region save navigation"
          git push
