name: T042 Targeted Diagnostics

on:
  pull_request:

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/t042-export-import-battle-resume
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: |
          corepack enable
          corepack prepare pnpm@10.13.1 --activate
          pnpm install --no-frozen-lockfile
      - name: Capture targeted test
        run: |
          set +e
          pnpm vitest run src/battle/interactive-battle-stable-snapshot.test.ts > /tmp/t042-targeted.log 2>&1
          status=$?
          cat /tmp/t042-targeted.log > t042-targeted-error.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add t042-targeted-error.txt
          git commit -m "Capture targeted T042 diagnostics" || true
          git push
          exit $status
