name: Materialize T029 patch

on:
  push:
    branches:
      - agent/t029-battle-screen-suite

permissions:
  contents: write

jobs:
  materialize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply staged implementation
        run: |
          base64 --decode .agent/t029-patch.tar.gz.b64 > /tmp/t029-patch.tar.gz
          tar -xzf /tmp/t029-patch.tar.gz -C /tmp/t029
          cp -R /tmp/t029/src/. src/
          cp -R /tmp/t029/tasks/. tasks/
          python /tmp/t029/scripts/apply_t029.py
          rm -rf .agent
          rm .github/workflows/t029-materialize.yml
      - name: Commit implementation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "T029 add battle screen suite"
          git push
