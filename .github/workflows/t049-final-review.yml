name: T049 Final Review

on:
  push:
    branches:
      - agent/t049-display-name-masters

permissions:
  contents: write

jobs:
  review:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/t049-display-name-masters
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.13.1 --activate
      - name: Apply final review fixes
        run: python3 scripts/t049_finalize.py
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Remove generated lockfile
        run: rm -f pnpm-lock.yaml
      - name: Format changed files
        shell: bash
        run: |
          git diff --name-only --diff-filter=ACM -z | xargs -0 -r pnpm exec prettier --write --ignore-unknown
      - name: Content validation
        run: pnpm validate:content
      - name: Test
        run: pnpm test
      - name: Headless demo
        run: pnpm demo:headless > /tmp/headless-battle-demo.json
      - name: AI regression benchmark
        run: pnpm benchmark:ai
      - name: Balance benchmark
        run: pnpm benchmark:balance > /tmp/vertical-slice-balance.json
      - name: Lint
        run: pnpm lint
      - name: Build
        run: pnpm build
      - name: Commit reviewed changes
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          if git diff --cached --quiet; then
            echo "No reviewed changes"
            exit 0
          fi
          git commit -m "T049: complete display-name review"
          git push origin HEAD:agent/t049-display-name-masters
