name: T048 update release candidate docs

on:
  push:
    branches: [agent/t048-v0-1-release]
    paths:
      - .github/workflows/t048-docs-patch.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/t048-v0-1-release
          fetch-depth: 0
      - name: Update README and vertical-slice status
        run: |
          python - <<'PY'
          from pathlib import Path

          readme = Path('README.md')
          text = readme.read_text()
          text = text.replace(
              '# Monster Research Tactics\n',
              '# Monster Research Tactics\n\n> Release candidate: `0.1.0-rc.1`。v0.1合格判定はNO-GOです。詳細は`docs/19_V0_1_RELEASE_READINESS.md`を参照してください。\n',
              1,
          )
          text = text.replace(
              '起動直後は使用中セーブスロットをIndexedDBから検証・復元した後、地域・ステージ画面を表示します。',
              '起動直後は使用中セーブスロットをIndexedDBから検証・復元した後、ホーム画面を表示します。ホームから地域・ステージ、編成・図鑑、研究、召喚、セーブへ移動できます。',
              1,
          )
          text = text.replace(
              '現行ヘッドレスランナーは`SINGLE_ENEMY`技だけを実解決するため、回復量と過剰回復率は未対応として`false`／`null`を出力し、ゼロ性能とは扱いません。T047でT046カタログを画面循環へ接続した後、支援効果の統合値は別途再計測します。',
              '現行戦闘ランナーは`SINGLE_ENEMY`技だけを実解決するため、回復・障壁・浄化・時間短縮などの支援技はrelease blockerです。回復量と過剰回復率は未対応として`false`／`null`を出力し、ゼロ性能とは扱いません。',
              1,
          )
          text = text.replace(
              '- Phase 9 T043～T046：完了\n\n次の実装対象はT047「通し結合・堅牢化」です。詳細は`tasks/STATUS.md`と`docs/17_IMPLEMENTATION_ROADMAP.md`を参照してください。',
              '- Phase 9 T043～T046：完了\n- Phase 10 T047：完了 / T048：release candidate検証中（NO-GO）\n\n現在の実装対象はT048「合格条件検証・v0.1リリース」です。支援・回復技の戦闘統合とVercel本番確認が残っています。詳細は`tasks/STATUS.md`と`docs/19_V0_1_RELEASE_READINESS.md`を参照してください。',
              1,
          )
          readme.write_text(text)

          vertical = Path('docs/14_VERTICAL_SLICE.md')
          vtext = vertical.read_text()
          old = 'T046では指標収集、データ調整パス1、導入3戦の短文案内を完了しました。T047でT046カタログを実際の画面循環へ接続し、未接続の支援効果を含む通し動作を確認します。'
          new = 'T048のrelease candidate検証では、調整済みT046カタログの実行時接続と低レア開花研究UIを確認しました。一方、戦闘ランナーが味方対象・自身対象の支援技を実解決しないため、回復無限と過剰回復の条件は未判定です。v0.1の判定はNO-GOとし、`docs/19_V0_1_RELEASE_READINESS.md`へ根拠と解除条件を記録します。'
          if old not in vtext:
              raise SystemExit('vertical-slice status paragraph not found')
          vertical.write_text(vtext.replace(old, new, 1))
          PY
          rm .github/workflows/t048-docs-patch.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add README.md docs/14_VERTICAL_SLICE.md .github/workflows/t048-docs-patch.yml
          git commit -m "T048 document release candidate status"
          git push origin HEAD:agent/t048-v0-1-release
