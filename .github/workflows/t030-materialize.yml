name: T030 Runner Materialize

on:
  push:
    branches:
      - agent/t030-manual-preview

permissions:
  contents: write

jobs:
  materialize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: agent/t030-manual-preview
      - name: Apply runner patch
        run: |
          python .agent/apply_t030_runner.py
          rm -rf .agent
          rm .github/workflows/t030-materialize.yml
      - name: Commit runner
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "T030 connect manual action previews"
          git push origin HEAD:agent/t030-manual-preview
