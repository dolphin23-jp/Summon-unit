name: T030 Finalize Materialize

on:
  push:
    branches:
      - agent/t030-manual-preview

permissions:
  contents: write

jobs:
  materialize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: agent/t030-manual-preview
      - name: Apply final integration
        run: |
          python .agent/finalize_t030.py
          rm -rf .agent
          rm .github/workflows/t030-finalize.yml
      - name: Commit integration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "T030 finalize confirmed manual action UI"
          git push origin HEAD:agent/t030-manual-preview
