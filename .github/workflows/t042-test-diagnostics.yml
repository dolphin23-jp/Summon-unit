name: T042 Test Diagnostics

on:
  pull_request:

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/t042-export-import-battle-resume
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: |
          corepack enable
          corepack prepare pnpm@10.13.1 --activate
          pnpm install --no-frozen-lockfile
      - name: Capture test result
        run: |
          set +e
          pnpm test > /tmp/t042-test.log 2>&1
          status=$?
          tail -180 /tmp/t042-test.log > t042-test-error.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add t042-test-error.txt
          git commit -m "Capture T042 test diagnostics" || true
          git push
          exit $status
