name: CI

on:
  pull_request:

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply demo region theme compatibility
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/demo/region-ui-demo.ts')
          content = path.read_text(encoding='utf-8')
          content = content.replace(
              "    summary: '遮蔽、射線、優先撃破を学ぶ導入地域です。',\n    order: 1,",
              "    summary: '遮蔽、射線、優先撃破を学ぶ導入地域です。',\n    themeColor: '#55b889',\n    order: 1,",
          )
          content = content.replace(
              "    summary: '地域ボス撃破後に開く、次地域の先行観測区画です。',\n    order: 2,",
              "    summary: '地域ボス撃破後に開く、次地域の先行観測区画です。',\n    themeColor: '#a97962',\n    order: 2,",
          )
          path.write_text(content, encoding='utf-8')
          Path('tasks/T052_VALIDATION_DIAGNOSTICS.txt').unlink(missing_ok=True)
          PY

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.13.1 --activate

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Format compatibility file
        run: pnpm exec prettier --write src/demo/region-ui-demo.ts

      - name: Commit compatibility fix
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "No compatibility changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/demo/region-ui-demo.ts tasks/T052_VALIDATION_DIAGNOSTICS.txt
          git commit -m "T052: add demo region theme colors"
          git push origin HEAD:${{ github.head_ref }}

      - name: Content validation
        run: pnpm validate:content

      - name: Test
        id: test
        run: |
          set -o pipefail
          pnpm test 2>&1 | tee /tmp/vitest.log

      - name: Upload test diagnostics
        if: failure() && steps.test.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: vitest-diagnostics
          path: /tmp/vitest.log
          if-no-files-found: error
          retention-days: 3

      - name: Headless demo
        run: pnpm demo:headless > /tmp/headless-battle-demo.json

      - name: AI regression benchmark
        run: pnpm benchmark:ai

      - name: Vertical slice balance benchmark
        run: pnpm benchmark:balance > /tmp/vertical-slice-balance.json

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
