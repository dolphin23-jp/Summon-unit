name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.13.1 --activate

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Test
        run: pnpm test

      - name: Headless demo
        run: pnpm demo:headless > /tmp/headless-battle-demo.json

      - name: AI regression benchmark
        run: pnpm benchmark:ai

      - name: Lint
        run: pnpm lint

      - name: Build
        id: build
        continue-on-error: true
        run: pnpm build 2>&1 | tee build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: t029-build-log
          path: build.log

      - name: Fail when build failed
        if: steps.build.outcome == 'failure'
        run: exit 1
