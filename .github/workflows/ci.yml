name: T030 Runtime Fix

on:
  push:
    branches:
      - agent/t030-manual-preview-v2
  pull_request:

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Apply T030 runtime fixes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git clone --quiet --depth 1 --branch agent/t030-manual-preview-v2 "https://x-access-token:${GH_TOKEN}@github.com/dolphin23-jp/Summon-unit.git" repo
          cd repo
          python .agent/fix-t030-runtime.py
          rm -rf .agent
          git fetch --quiet --depth 1 origin main
          git show FETCH_HEAD:.github/workflows/ci.yml > .github/workflows/ci.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "T030 fix legal targets and self skill events"
          git push origin HEAD:agent/t030-manual-preview-v2
