name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.13.1 --activate

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Compile headless diagnostics
        id: headless_compile
        continue-on-error: true
        run: pnpm exec tsc -p tsconfig.headless.json --pretty false > /tmp/headless-tsc.txt 2>&1

      - name: Upload headless diagnostics
        if: steps.headless_compile.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: headless-tsc-errors
          path: /tmp/headless-tsc.txt

      - name: Stop on headless compile failure
        if: steps.headless_compile.outcome == 'failure'
        run: exit 1

      - name: Content validation
        run: pnpm validate:content

      - name: Test
        run: pnpm test

      - name: Headless demo
        run: pnpm demo:headless > /tmp/headless-battle-demo.json

      - name: AI regression benchmark
        run: pnpm benchmark:ai

      - name: Vertical slice balance benchmark
        run: pnpm benchmark:balance > /tmp/vertical-slice-balance.json

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
