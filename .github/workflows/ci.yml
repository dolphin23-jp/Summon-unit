name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.13.1 --activate

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Content validation
        id: content
        run: |
          set -o pipefail
          pnpm validate:content 2>&1 | tee /tmp/content-validation.log

      - name: Upload content validation diagnostics
        if: failure() && steps.content.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: content-validation-diagnostics
          path: /tmp/content-validation.log
          if-no-files-found: error
          retention-days: 3

      - name: Test
        id: test
        run: |
          set -o pipefail
          pnpm test 2>&1 | tee /tmp/vitest.log

      - name: Upload test diagnostics
        if: failure() && steps.test.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: vitest-diagnostics
          path: /tmp/vitest.log
          if-no-files-found: error
          retention-days: 3

      - name: Headless demo
        run: pnpm demo:headless > /tmp/headless-battle-demo.json

      - name: AI regression benchmark
        run: pnpm benchmark:ai

      - name: Vertical slice balance benchmark
        run: pnpm benchmark:balance > /tmp/vertical-slice-balance.json

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
