name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.13.1 --activate

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Content validation
        run: pnpm validate:content

      - name: Run tests
        id: tests
        continue-on-error: true
        run: pnpm test > /tmp/tests.txt 2>&1

      - name: Headless demo
        run: pnpm demo:headless > /tmp/headless-battle-demo.json

      - name: AI regression benchmark
        run: pnpm benchmark:ai

      - name: Run vertical slice balance benchmark
        id: balance_benchmark
        continue-on-error: true
        run: pnpm benchmark:balance > /tmp/vertical-slice-balance.json 2> /tmp/vertical-slice-balance.err

      - name: Upload T046 diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: t046-diagnostics
          path: |
            /tmp/tests.txt
            /tmp/vertical-slice-balance.json
            /tmp/vertical-slice-balance.err

      - name: Stop on test or benchmark failure
        if: steps.tests.outcome == 'failure' || steps.balance_benchmark.outcome == 'failure'
        run: exit 1

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
