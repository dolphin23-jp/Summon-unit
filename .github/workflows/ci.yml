name: T030 Materialize

on:
  push:
    branches:
      - agent/t030-manual-preview
  pull_request:

permissions:
  contents: write

jobs:
  materialize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Apply T030 implementation
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git clone --quiet --depth 1 --branch agent/t030-manual-preview "https://x-access-token:${GH_TOKEN}@github.com/dolphin23-jp/Summon-unit.git" repo
          cd repo
          base64 --decode .agent/t030-patch.tar.gz.b64 > /tmp/t030-patch.tar.gz
          tar -xzf /tmp/t030-patch.tar.gz -C /tmp
          if ! python /tmp/apply_t030.py > /tmp/t030-materialize.log 2>&1; then
            cat /tmp/t030-materialize.log
            exit 1
          fi
          rm -rf .agent
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "T030 add manual action confirmed previews"
          git push origin HEAD:agent/t030-manual-preview
