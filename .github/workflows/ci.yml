name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.13.1 --activate

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Test
        run: pnpm test

      - name: Headless demo
        shell: bash
        run: |
          set -o pipefail
          pnpm demo:headless 2>&1 | tee /tmp/headless-diagnostics.txt

      - name: Upload headless diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: headless-diagnostics
          path: /tmp/headless-diagnostics.txt

      - name: AI regression benchmark
        run: pnpm benchmark:ai > /tmp/ai-regression-benchmark.json

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
