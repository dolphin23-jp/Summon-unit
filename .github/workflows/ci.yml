name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.13.1 --activate

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Test
        run: pnpm test

      - name: Headless demo
        run: pnpm demo:headless > /tmp/headless-battle-demo.json

      - name: Capture headless typecheck diagnostics
        if: failure()
        run: pnpm exec tsc -p tsconfig.headless.json --pretty false > headless-typecheck.txt 2>&1 || true

      - name: Upload headless typecheck diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: headless-typecheck-diagnostics
          path: headless-typecheck.txt

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
