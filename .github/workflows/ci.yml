name: CI

on:
  pull_request:

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Materialize T051 implementation
        run: python scripts/t051_materialize.py

      - name: Apply static-analysis fixes
        run: |
          python - <<'PY'
          from pathlib import Path

          icon = Path('src/ui/MonsterIcon.tsx')
          content = icon.read_text(encoding='utf-8')
          content = content.replace(
              """}: MonsterIconProps) {
            const resolvedSpeciesId = species?.id ?? speciesId
            if (resolvedSpeciesId === undefined || resolvedSpeciesId.trim().length === 0) {
              throw new Error('MonsterIcon requires species or speciesId')
            }

            const [failedImageSrc, setFailedImageSrc] = useState<string | null>(null)
          """,
              """}: MonsterIconProps) {
            const [failedImageSrc, setFailedImageSrc] = useState<string | null>(null)
            const resolvedSpeciesId = species?.id ?? speciesId
            if (resolvedSpeciesId === undefined || resolvedSpeciesId.trim().length === 0) {
              throw new Error('MonsterIcon requires species or speciesId')
            }

          """,
          )
          icon.write_text(content, encoding='utf-8')

          decision = Path('src/ui/BattleDecisionPanel.tsx')
          content = decision.read_text(encoding='utf-8').replace(
              'export function getBattleEventActorId',
              'function getBattleEventActorId',
          )
          decision.write_text(content, encoding='utf-8')
          PY

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.13.1 --activate

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Format changed files
        run: |
          pnpm exec prettier --write \
            src/ui/monster-image-presentation.ts \
            src/ui/MonsterIcon.tsx \
            src/ui/BattleUnitCard.tsx \
            src/ui/BattleTimelinePanel.tsx \
            src/ui/BattleDecisionPanel.tsx \
            src/ui/MonsterIcon.test.ts \
            src/ui/MonsterIconMarkup.test.tsx \
            src/ui/MinimalBattleScreen.tsx \
            src/ui/HomeScreen.tsx \
            src/ui/SummonScreen.tsx \
            src/ui/ResearchScreen.tsx \
            src/ui/CollectionScreen.tsx \
            src/ui/BattleResultScreen.tsx \
            src/main.tsx \
            src/t051.css \
            tasks/T051_MONSTER_ART_EVERYWHERE.md \
            tasks/STATUS.md \
            docs/12_UI_UX.md

      - name: Commit materialized implementation
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "No materialized changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/ui/monster-image-presentation.ts \
            src/ui/MonsterIcon.tsx \
            src/ui/BattleUnitCard.tsx \
            src/ui/BattleTimelinePanel.tsx \
            src/ui/BattleDecisionPanel.tsx \
            src/ui/MonsterIcon.test.ts \
            src/ui/MonsterIconMarkup.test.tsx \
            src/ui/MinimalBattleScreen.tsx \
            src/ui/HomeScreen.tsx \
            src/ui/SummonScreen.tsx \
            src/ui/ResearchScreen.tsx \
            src/ui/CollectionScreen.tsx \
            src/ui/BattleResultScreen.tsx \
            src/main.tsx \
            src/t051.css \
            tasks/T051_MONSTER_ART_EVERYWHERE.md \
            tasks/STATUS.md \
            docs/12_UI_UX.md
          git commit -m "T051: モンスター画像を全面活用"
          git push origin HEAD:${{ github.head_ref }}

      - name: Content validation
        run: pnpm validate:content

      - name: Test
        run: pnpm test

      - name: Headless demo
        run: pnpm demo:headless > /tmp/headless-battle-demo.json

      - name: AI regression benchmark
        run: pnpm benchmark:ai

      - name: Vertical slice balance benchmark
        run: pnpm benchmark:balance > /tmp/vertical-slice-balance.json

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
