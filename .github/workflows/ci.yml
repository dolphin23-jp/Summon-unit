name: T030 Effects Completion

on:
  push:
    branches:
      - agent/t030-effects-completion
  pull_request:

permissions:
  contents: write

jobs:
  materialize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Apply T030 effect integration
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git clone --quiet --depth 1 --branch agent/t030-effects-completion "https://x-access-token:${GH_TOKEN}@github.com/dolphin23-jp/Summon-unit.git" repo
          cd repo
          git fetch --quiet --depth 1 origin agent/t030-manual-preview-v2
          python .agent/apply-t030-effects.py
          rm -rf .agent
          git fetch --quiet --depth 1 origin main
          git show FETCH_HEAD:.github/workflows/ci.yml > .github/workflows/ci.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "T030 connect status and forced movement previews"
          git push origin HEAD:agent/t030-effects-completion
