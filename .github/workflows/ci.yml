name: CI

on:
  pull_request:

permissions:
  contents: write

jobs:
  lint-diagnostics:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.13.1 --activate

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Capture lint diagnostics
        run: |
          set +e
          set -o pipefail
          pnpm lint 2>&1 | tee /tmp/t051-lint.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            cp /tmp/t051-lint.log tasks/T051_LINT_DIAGNOSTICS.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add tasks/T051_LINT_DIAGNOSTICS.txt
            git commit -m "Record T051 lint diagnostics"
            git push origin HEAD:${{ github.head_ref }}
          fi
          exit "$status"
